data:
  raw_path: data/amazon_sessions.csv
  output_dir: outputs/cbmt_amazon
  customer_id_col: machine_id
  session_id_col: site_session_id
  date_col: event_date
  transaction_flag_col: tran_flg
  payment_col: prod_totprice
  pages_col: pages_viewed
  duration_col: duration
  quantity_col: prod_qty
  covariate_cols:
    - household_income
    - household_size
    - census_region
    - racial_background
    - country_of_origin
  cohort_definition: first_visit
  page_agg: max
  duration_agg: max

split:
  baseline_start: null
  train_start: null
  val_weeks: 12
  holdout_weeks: 12
  week_start: SUN
  oracle_holdout_cohorts: false

model:
  lookback_weeks: 20
  d_model: 128
  n_heads: 4
  n_encoder_layers: 2
  n_decoder_layers: 1
  dropout: 0.1
  head_hidden_dim: 128
  batch_size: 512
  max_epochs: 200
  patience: 20
  lr_backbone: 0.0003
  lr_heads: 0.001
  weight_decay: 0.0001
  aov_weight_decay_mult: 1000
  gradient_clip_norm: 1.0
  seed: 123
  loss_weights:
    visits_pc: 1.0
    txns_pc: 1.0
    avg_payment: 1.0
    agg_visits: 1.0
    agg_txns: 1.0
    agg_revenue: 1.0
    revenue_consistency: 4.0
    visit_consistency: 1.0
    txn_consistency: 1.0
